<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>2048</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #faf8f0;
    --board-bg: #c2b9a8;
    --cell-empty: #d6cfc1;
    --text-dark: #776e65;
    --text-light: #f9f6f2;
    --button-bg: #8f7a66;
    --score-bg: #bbada0;
    --tile-2: #eee4da;
    --tile-4: #ede0c8;
    --tile-8: #f2b179;
    --tile-16: #f59563;
    --tile-32: #f67c5f;
    --tile-64: #f65e3b;
    --tile-128: #edcf72;
    --tile-256: #edcc61;
    --tile-512: #edc850;
    --tile-1024: #edc53f;
    --tile-2048: #edc22e;
    --tile-super: #3c3a32;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    min-height: 100dvh;
    overflow: hidden;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }

  .container {
    width: 100%;
    max-width: 420px;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .title {
    font-size: 52px;
    font-weight: 800;
    color: var(--text-dark);
    letter-spacing: -1px;
    line-height: 1;
  }

  .scores { display: flex; gap: 8px; }

  .score-box {
    background: var(--score-bg);
    color: white;
    border-radius: 6px;
    padding: 6px 16px;
    text-align: center;
    min-width: 64px;
  }

  .score-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    opacity: 0.8;
  }

  .score-value {
    font-size: 22px;
    font-weight: 700;
    transition: transform 0.15s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  .score-value.pop {
    transform: scale(1.3);
  }

  .actions { display: flex; gap: 8px; }

  .btn {
    flex: 1;
    padding: 10px 0;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: background 0.15s, transform 0.10s, opacity 0.15s;
    color: var(--text-light);
    background: var(--button-bg);
  }

  .btn:active { transform: scale(0.96); }

  .btn.undo { background: #a09485; }

  .btn.undo:disabled {
    opacity: 0.4;
    cursor: default;
    transform: none;
  }

  /* Board */
  .board-wrapper {
    position: relative;
    width: 100%;
    aspect-ratio: 1;
  }

  .board {
    position: absolute;
    inset: 0;
    background: var(--board-bg);
    border-radius: 8px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 10px;
    padding: 10px;
  }

  .cell {
    background: var(--cell-empty);
    border-radius: 5px;
  }

  /* Tile layer */
  .tile-layer {
    position: absolute;
    inset: 10px;
    pointer-events: none;
  }

  .tile {
    position: absolute;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    border-radius: 5px;
    color: var(--text-dark);
    /* Core slide transition */
    transition: transform 0.14s cubic-bezier(0.22, 0.61, 0.36, 1),
                opacity 0.12s ease;
    will-change: transform;
  }

  /* Animations layered on top of the slide transition */
  .tile.merging {
    z-index: 2;
    animation: tile-pop 0.18s cubic-bezier(0.22, 0.61, 0.36, 1) 0.08s both;
  }

  .tile.spawning {
    animation: tile-spawn 0.20s cubic-bezier(0.22, 0.61, 0.36, 1) both;
  }

  @keyframes tile-pop {
    0%   { transform: translate(var(--tx), var(--ty)) scale(1); }
    40%  { transform: translate(var(--tx), var(--ty)) scale(1.20); }
    100% { transform: translate(var(--tx), var(--ty)) scale(1); }
  }

  @keyframes tile-spawn {
    0%   { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
    60%  { transform: translate(var(--tx), var(--ty)) scale(1.08); opacity: 1; }
    100% { transform: translate(var(--tx), var(--ty)) scale(1); opacity: 1; }
  }

  /* Tile colors */
  .tile[data-value="2"]    { background: var(--tile-2); }
  .tile[data-value="4"]    { background: var(--tile-4); }
  .tile[data-value="8"]    { background: var(--tile-8); color: var(--text-light); }
  .tile[data-value="16"]   { background: var(--tile-16); color: var(--text-light); }
  .tile[data-value="32"]   { background: var(--tile-32); color: var(--text-light); }
  .tile[data-value="64"]   { background: var(--tile-64); color: var(--text-light); }
  .tile[data-value="128"]  { background: var(--tile-128); color: var(--text-light); }
  .tile[data-value="256"]  { background: var(--tile-256); color: var(--text-light); }
  .tile[data-value="512"]  { background: var(--tile-512); color: var(--text-light); }
  .tile[data-value="1024"] { background: var(--tile-1024); color: var(--text-light); }
  .tile[data-value="2048"] { background: var(--tile-2048); color: var(--text-light); }
  .tile[data-value="4096"],
  .tile[data-value="8192"] { background: var(--tile-super); color: var(--text-light); font-size: 22px; }

  /* Overlay */
  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(238, 228, 218, 0.73);
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    z-index: 10;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s;
  }

  .overlay.visible { opacity: 1; pointer-events: auto; }

  .overlay-text {
    font-size: 36px;
    font-weight: 800;
    color: var(--text-dark);
  }

  .overlay .btn { flex: none; padding: 12px 32px; }

  /* Responsive */
  @media (max-width: 380px) {
    .title { font-size: 40px; }
    .board { gap: 7px; padding: 7px; }
    .tile-layer { inset: 7px; }
    .tile { font-size: 30px !important; }
    .tile[data-value="2"],
    .tile[data-value="4"]    { font-size: 30px !important; }
    .tile[data-value="8"],
    .tile[data-value="16"],
    .tile[data-value="32"],
    .tile[data-value="64"]   { font-size: 30px !important; }
    .tile[data-value="128"],
    .tile[data-value="256"],
    .tile[data-value="512"]  { font-size: 24px !important; }
    .tile[data-value="1024"],
    .tile[data-value="2048"] { font-size: 20px !important; }
    .tile[data-value="4096"],
    .tile[data-value="8192"] { font-size: 17px !important; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="title">2048</div>
    <div class="scores">
      <div class="score-box">
        <div class="score-label">分数</div>
        <div class="score-value" id="score">0</div>
      </div>
      <div class="score-box">
        <div class="score-label">最高</div>
        <div class="score-value" id="best">0</div>
      </div>
    </div>
  </div>

  <div class="actions">
    <button class="btn undo" id="undoBtn" disabled>↩ 悔棋</button>
    <button class="btn new-game" id="newGameBtn">新游戏</button>
  </div>

  <div class="board-wrapper" id="boardWrapper">
    <div class="board" id="board">
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    </div>
    <div class="tile-layer" id="tileLayer"></div>
    <div class="overlay" id="overlay">
      <div class="overlay-text" id="overlayText">游戏结束</div>
      <button class="btn" id="retryBtn">再来一局</button>
    </div>
  </div>
</div>

<script>
(function() {
  // ═══════════════════════════════════════════════════════════════
  //  AUDIO ENGINE
  // ═══════════════════════════════════════════════════════════════
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  let audioCtx = null;

  function ensureAudio() {
    if (!audioCtx) audioCtx = new AudioCtx();
  }

  function playTone(freq, type, duration, vol = 0.10, rampDown = true) {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t);
    gain.gain.setValueAtTime(vol, t);
    if (rampDown) gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + duration);
  }

  function sfxMove()       { playTone(280, 'sine', 0.07, 0.05); }
  function sfxInvalid()    { playTone(140, 'square', 0.08, 0.03, false); }
  function sfxGameOver()   {
    playTone(200, 'triangle', 0.25, 0.09);
    setTimeout(() => playTone(150, 'triangle', 0.30, 0.09), 130);
    setTimeout(() => playTone(110, 'triangle', 0.40, 0.10), 260);
  }
  function sfxMerge(n) {
    const base = 320 + Math.log2(n) * 38;
    playTone(base, 'triangle', 0.14, 0.09);
    setTimeout(() => playTone(base * 1.25, 'sine', 0.11, 0.06), 35);
  }

  // ═══════════════════════════════════════════════════════════════
  //  DOM REFS
  // ═══════════════════════════════════════════════════════════════
  const tileLayer  = document.getElementById('tileLayer');
  const boardEl    = document.getElementById('board');
  const scoreEl    = document.getElementById('score');
  const bestEl     = document.getElementById('best');
  const overlay    = document.getElementById('overlay');
  const overlayText = document.getElementById('overlayText');
  const undoBtn    = document.getElementById('undoBtn');

  // ═══════════════════════════════════════════════════════════════
  //  GAME STATE
  // ═══════════════════════════════════════════════════════════════
  const SIZE = 4;
  let grid      = [];      // grid[r][c] = {id, value} | null
  let score     = 0;
  let best      = 0;
  let gameOver  = false;
  let won       = false;
  let animating = false;   // block input during animation
  let nextId    = 1;       // monotonic tile ID counter

  // Undo
  let prevGrid   = null;   // snapshot of grid before last move
  let prevScore  = 0;
  let canUndo    = false;

  // Tile DOM registry: id → element
  let tileMap = new Map();

  // ═══════════════════════════════════════════════════════════════
  //  GEOMETRY
  // ═══════════════════════════════════════════════════════════════
  function cellGeometry() {
    const rect = boardEl.getBoundingClientRect();
    const gap = parseFloat(getComputedStyle(boardEl).gap) || 10;
    const pad = parseFloat(getComputedStyle(boardEl).padding) || 10;
    const size = (rect.width - pad * 2 - gap * (SIZE - 1)) / SIZE;
    return { size, gap, pad };
  }

  function tilePos(r, c) {
    const { size, gap } = cellGeometry();
    return {
      x: c * (size + gap),
      y: r * (size + gap),
      size,
    };
  }

  // ═══════════════════════════════════════════════════════════════
  //  PERSISTENCE
  // ═══════════════════════════════════════════════════════════════
  function loadBest() {
    try { best = parseInt(localStorage.getItem('2048_best') || '0', 10) || 0; }
    catch (e) { best = 0; }
    bestEl.textContent = best;
  }

  function saveBest() {
    try { localStorage.setItem('2048_best', best); } catch (e) {}
  }

  // ═══════════════════════════════════════════════════════════════
  //  SCORE DISPLAY
  // ═══════════════════════════════════════════════════════════════
  function updateScore() {
    scoreEl.textContent = score;
    bestEl.textContent = best;
  }

  function popScore() {
    scoreEl.classList.remove('pop');
    void scoreEl.offsetWidth; // force reflow
    scoreEl.classList.add('pop');
  }

  // ═══════════════════════════════════════════════════════════════
  //  TILE DOM HELPERS
  // ═══════════════════════════════════════════════════════════════
  function createTileElement(id, value, r, c) {
    const el = document.createElement('div');
    el.className = 'tile';
    el.setAttribute('data-value', value);
    el.setAttribute('data-id', id);
    el.textContent = value;
    const { x, y, size } = tilePos(r, c);
    el.style.width  = size + 'px';
    el.style.height = size + 'px';
    el.style.setProperty('--tx', x + 'px');
    el.style.setProperty('--ty', y + 'px');
    el.style.transform = `translate(${x}px, ${y}px)`;
    return el;
  }

  function positionTile(el, r, c) {
    const { x, y, size } = tilePos(r, c);
    el.style.width  = size + 'px';
    el.style.height = size + 'px';
    el.style.setProperty('--tx', x + 'px');
    el.style.setProperty('--ty', y + 'px');
    el.style.transform = `translate(${x}px, ${y}px)`;
  }

  // ═══════════════════════════════════════════════════════════════
  //  GRID UTILITIES
  // ═══════════════════════════════════════════════════════════════
  function emptyGrid() {
    return Array.from({ length: SIZE }, () => Array(SIZE).fill(null));
  }

  function cloneGrid(g) {
    return g.map(row => row.map(cell => cell ? { ...cell } : null));
  }

  function vacantCells(g) {
    const cells = [];
    for (let r = 0; r < SIZE; r++)
      for (let c = 0; c < SIZE; c++)
        if (g[r][c] === null) cells.push({ r, c });
    return cells;
  }

  function addRandomTile(g) {
    const vac = vacantCells(g);
    if (!vac.length) return null;
    const { r, c } = vac[Math.floor(Math.random() * vac.length)];
    const value = Math.random() < 0.9 ? 2 : 4;
    const id = nextId++;
    g[r][c] = { id, value };
    return { id, r, c, value };
  }

  // ═══════════════════════════════════════════════════════════════
  //  MOVE LOGIC  (with full tracking for animations)
  // ═══════════════════════════════════════════════════════════════
  //
  //  slideRowTracked(row)  — slides one array left, returns:
  //    result:     (Cell | null)[]     final 4 cells
  //    movements:  {id, fromCol, toCol}[]
  //    merges:     {consumerId, consumedId, value, col}[]
  //
  //  moveTracked(dir)      — full-grid move, returns:
  //    grid:        new grid
  //    movements:   {id, fromR, fromC, toR, toC}[]
  //    merges:      {consumerId, consumedId, value, r, c}[]
  //    scoreGained: number

  function slideRowTracked(row) {
    // 1. Pick out non-null cells with their original column index
    const items = [];
    for (let c = 0; c < SIZE; c++) {
      if (row[c] !== null) items.push({ ...row[c], fromCol: c });
    }

    const merges    = [];
    const movements = [];

    // 2. Merge pass
    for (let i = 0; i < items.length - 1; i++) {
      if (items[i].value === items[i + 1].value) {
        items[i].value *= 2;
        merges.push({
          consumerId: items[i].id,
          consumedId: items[i + 1].id,
          value:      items[i].value,
          // final column set after pad step
        });
        items.splice(i + 1, 1);
      }
    }

    // 3. Build result (left-aligned) + movement records
    const result = Array(SIZE).fill(null);
    for (let i = 0; i < items.length; i++) {
      result[i] = { id: items[i].id, value: items[i].value };
      if (items[i].fromCol !== i) {
        movements.push({
          id:      items[i].id,
          fromCol: items[i].fromCol,
          toCol:   i,
        });
      }
    }

    // 4. Fill in merge column positions
    for (const m of merges) {
      const idx = result.findIndex(cell => cell && cell.id === m.consumerId);
      m.col = idx;
    }

    return { result, movements, merges };
  }

  function moveTracked(dir) {
    // dir: 0=up, 1=right, 2=down, 3=left
    const isRow   = (dir === 1 || dir === 3);
    const reverse = (dir === 1 || dir === 2);

    let g = cloneGrid(grid);
    let moved = false;
    let totalScore = 0;
    const allMovements = [];
    const allMerges    = [];

    if (!isRow) g = transpose(g);

    for (let r = 0; r < SIZE; r++) {
      // Snapshot original row values BEFORE any reversal (for accurate change detection)
      const origValues = g[r].map(cell => cell ? cell.value : 0);

      let row = g[r];
      if (reverse) row = [...row].reverse();

      const { result, movements, merges } = slideRowTracked(row);

      if (reverse) result.reverse();

      // Compare new result against the original row values
      const newValues = result.map(cell => cell ? cell.value : 0);
      if (origValues.some((v, i) => v !== newValues[i])) moved = true;

      g[r] = result;

      // Map movements to grid coordinates
      for (const m of movements) {
        const fc = reverse ? SIZE - 1 - m.fromCol : m.fromCol;
        const tc = reverse ? SIZE - 1 - m.toCol   : m.toCol;
        if (isRow) {
          allMovements.push({ id: m.id, fromR: r, fromC: fc, toR: r, toC: tc });
        } else {
          allMovements.push({ id: m.id, fromR: fc, fromC: r, toR: tc, toC: r });
        }
      }

      // Map merges to grid coordinates
      for (const m of merges) {
        const mc = reverse ? SIZE - 1 - m.col : m.col;
        totalScore += m.value;
        if (isRow) {
          allMerges.push({ ...m, r, c: mc });
        } else {
          allMerges.push({ ...m, r: mc, c: r });
        }
      }
    }

    if (!isRow) g = transpose(g);

    if (!moved) return null;

    return { grid: g, movements: allMovements, merges: allMerges, scoreGained: totalScore };
  }

  function transpose(g) {
    return g[0].map((_, c) => g.map(row => row[c]));
  }

  // ═══════════════════════════════════════════════════════════════
  //  GAME-OVER CHECK
  // ═══════════════════════════════════════════════════════════════
  function isGameOver(g) {
    if (vacantCells(g).length > 0) return false;
    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        const v = g[r][c].value;
        if ((r < SIZE - 1 && g[r + 1][c] && g[r + 1][c].value === v) ||
            (c < SIZE - 1 && g[r][c + 1] && g[r][c + 1].value === v)) return false;
      }
    }
    return true;
  }

  // ═══════════════════════════════════════════════════════════════
  //  RENDER  — smooth animation via persistent tile elements
  // ═══════════════════════════════════════════════════════════════
  //
  //  Strategy:
  //   1. Tiles that MOVED:  transition-enabled, set new transform.
  //   2. Tiles that MERGED: consumer slides (step 1) + plays pop anim;
  //                          consumed tile fades out & is removed.
  //   3. NEW tiles:         created with spawn animation.

  function renderAnimated(movements, merges, newTiles, onDone) {
    // ── Consumed tiles: fade out, then remove ──
    for (const m of merges) {
      const el = tileMap.get(m.consumedId);
      if (!el) continue;
      el.style.transition = 'opacity 0.10s ease';
      el.style.opacity = '0';
      // Update the consumed tile's value text (it merges into consumer)
    }

    // ── Moved tiles: reposition (CSS transition handles the slide) ──
    const allMoveTargets = new Map(); // id → {r, c}
    for (const m of movements) allMoveTargets.set(m.id, { r: m.toR, c: m.toC });
    // Merged-to position for consumers that also moved (their movement is in `movements`)
    // Consumers that didn't move still need their position recorded for the pop animation
    for (const m of merges) {
      if (!allMoveTargets.has(m.consumerId)) {
        allMoveTargets.set(m.consumerId, { r: m.r, c: m.c });
      }
    }

    // Apply new positions (CSS transition animates them)
    for (const [id, pos] of allMoveTargets) {
      const el = tileMap.get(id);
      if (!el) continue;
      positionTile(el, pos.r, pos.c);
    }

    // ── New tiles: create, add spawn class ──
    for (const t of newTiles) {
      const el = createTileElement(t.id, t.value, t.r, t.c);
      el.classList.add('spawning');
      tileLayer.appendChild(el);
      tileMap.set(t.id, el);
    }

    // ── After slide transition completes: apply pop to merged tiles,
    //     remove consumed tiles, update merged tile values ──
    const SLIDE_DURATION = 150; // ms — matches CSS transition

    setTimeout(() => {
      // Update merged consumer tile values & trigger pop
      for (const m of merges) {
        const el = tileMap.get(m.consumerId);
        if (el) {
          // Update display
          el.setAttribute('data-value', m.value);
          el.textContent = m.value;
          // Trigger pop animation
          el.classList.add('merging');
          // Automatically remove class after animation
          el.addEventListener('animationend', function h() {
            el.removeEventListener('animationend', h);
            el.classList.remove('merging');
          });
        }
      }

      // Remove consumed tile DOM elements
      for (const m of merges) {
        const el = tileMap.get(m.consumedId);
        if (el) {
          el.remove();
          tileMap.delete(m.consumedId);
        }
      }

      // Remove spawn class from new tiles (animation already done)
      for (const t of newTiles) {
        const el = tileMap.get(t.id);
        if (el) {
          el.addEventListener('animationend', function h() {
            el.removeEventListener('animationend', h);
            el.classList.remove('spawning');
          });
        }
      }

      animating = false;
      if (onDone) onDone();
    }, SLIDE_DURATION);
  }

  // Full reset render (new game / undo) — no animations
  function renderStatic(tiles) {
    // Remove all existing tile elements
    for (const el of tileMap.values()) el.remove();
    tileMap.clear();

    for (const t of tiles) {
      const el = createTileElement(t.id, t.value, t.r, t.c);
      tileLayer.appendChild(el);
      tileMap.set(t.id, el);
    }
  }

  // Collect all tiles with positions from current grid
  function collectTiles(g) {
    const tiles = [];
    for (let r = 0; r < SIZE; r++)
      for (let c = 0; c < SIZE; c++)
        if (g[r][c] !== null)
          tiles.push({ id: g[r][c].id, value: g[r][c].value, r, c });
    return tiles;
  }

  // ═══════════════════════════════════════════════════════════════
  //  RESIZE HANDLER  — reposition tiles without destroying them
  // ═══════════════════════════════════════════════════════════════
  let resizeTimer;
  function onResize() {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      // Reposition all tile elements to match new cell geometry
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          const cell = grid[r] && grid[r][c];
          if (!cell) continue;
          const el = tileMap.get(cell.id);
          if (!el) continue;
          // Temporarily disable transition for instant reposition
          el.style.transition = 'none';
          positionTile(el, r, c);
          // Force layout then re-enable
          void el.offsetWidth;
          el.style.transition = '';
        }
      }
    }, 120);
  }
  window.addEventListener('resize', onResize);

  // ═══════════════════════════════════════════════════════════════
  //  UNDO
  // ═══════════════════════════════════════════════════════════════
  function saveUndoState() {
    prevGrid  = cloneGrid(grid);
    prevScore = score;
    canUndo   = true;
    undoBtn.disabled = false;
  }

  function undo() {
    if (!canUndo || !prevGrid || animating) return;
    ensureAudio();
    grid      = prevGrid;
    score     = prevScore;
    prevGrid  = null;
    prevScore = 0;
    canUndo   = false;
    undoBtn.disabled = true;
    gameOver  = false;
    overlay.classList.remove('visible');
    updateScore();
    // Static render — no animation for undo
    renderStatic(collectTiles(grid));
  }

  // ═══════════════════════════════════════════════════════════════
  //  EXECUTE MOVE
  // ═══════════════════════════════════════════════════════════════
  function executeMove(dir) {
    if (gameOver || animating) return;
    ensureAudio();

    saveUndoState();

    const result = moveTracked(dir);
    if (!result) {
      sfxInvalid();
      return; // nothing moved
    }

    animating = true;
    grid = result.grid;
    score += result.scoreGained;
    if (score > best) {
      best = score;
      saveBest();
    }
    updateScore();
    popScore();

    // Spawn new tile
    const newTile = addRandomTile(grid);
    const newTiles = newTile ? [newTile] : [];

    // Fire render with animations
    renderAnimated(result.movements, result.merges, newTiles, () => {
      // Post-animation checks
      // Check win (first 2048 merge)
      if (!won) {
        for (const m of result.merges) {
          if (m.value >= 2048) {
            won = true;
            overlayText.textContent = '你赢了！';
            overlay.classList.add('visible');
            break;
          }
        }
      }

      // Check game over
      if (!gameOver && isGameOver(grid)) {
        gameOver = true;
        overlayText.textContent = '游戏结束';
        overlay.classList.add('visible');
        setTimeout(sfxGameOver, 200);
      }
    });

    // Sound
    if (result.merges.length > 0) {
      const maxMerge = Math.max(...result.merges.map(m => m.value));
      sfxMerge(maxMerge);
    } else {
      sfxMove();
    }
  }

  // ═══════════════════════════════════════════════════════════════
  //  INIT / NEW GAME
  // ═══════════════════════════════════════════════════════════════
  function initGame() {
    grid      = emptyGrid();
    score     = 0;
    gameOver  = false;
    won       = false;
    animating = false;
    nextId    = 1;
    prevGrid  = null;
    prevScore = 0;
    canUndo   = false;
    undoBtn.disabled = true;
    overlay.classList.remove('visible');
    updateScore();

    // Spawn two starting tiles
    addRandomTile(grid);
    addRandomTile(grid);

    // Render statically
    renderStatic(collectTiles(grid));
  }

  // ═══════════════════════════════════════════════════════════════
  //  INPUT  — keyboard + touch
  // ═══════════════════════════════════════════════════════════════
  document.addEventListener('keydown', e => {
    const map = {
      ArrowUp: 0, ArrowRight: 1, ArrowDown: 2, ArrowLeft: 3,
      w: 0, W: 0, d: 1, D: 1, s: 2, S: 2, a: 3, A: 3,
    };
    const dir = map[e.key];
    if (dir !== undefined) {
      e.preventDefault();
      executeMove(dir);
    }
    // Ctrl+Z / Cmd+Z → undo
    if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
      e.preventDefault();
      undo();
    }
  });

  // Touch swipe
  let touchStartX = 0, touchStartY = 0;
  const boardWrapper = document.getElementById('boardWrapper');

  boardWrapper.addEventListener('touchstart', e => {
    if (e.touches.length === 0) return;
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });

  boardWrapper.addEventListener('touchend', e => {
    if (e.changedTouches.length === 0) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    const absDx = Math.abs(dx);
    const absDy = Math.abs(dy);
    const threshold = 16;

    if (Math.max(absDx, absDy) < threshold) return;

    if (absDx > absDy) {
      executeMove(dx > 0 ? 1 : 3);
    } else {
      executeMove(dy > 0 ? 2 : 0);
    }
  });

  boardWrapper.addEventListener('touchmove', e => {
    e.preventDefault();
  }, { passive: false });

  // ═══════════════════════════════════════════════════════════════
  //  BUTTONS
  // ═══════════════════════════════════════════════════════════════
  document.getElementById('newGameBtn').addEventListener('click', () => {
    ensureAudio();
    initGame();
  });

  document.getElementById('retryBtn').addEventListener('click', () => {
    ensureAudio();
    initGame();
  });

  undoBtn.addEventListener('click', () => {
    ensureAudio();
    undo();
  });

  // ═══════════════════════════════════════════════════════════════
  //  STARTUP
  // ═══════════════════════════════════════════════════════════════
  loadBest();
  initGame();
})();
</script>
</body>
</html>
